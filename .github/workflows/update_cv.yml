name: Update CV from Personal Repository

on:
  schedule:
    - cron: '0 0 * * *'  # This will run the workflow daily at midnight
  workflow_dispatch:  # This allows the workflow to be triggered manually

jobs:
  update-cv:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Organization Repository
      uses: actions/checkout@v3
      with:
        repository: parker-group/parker-group.github.io
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout Personal Repository
      uses: actions/checkout@v3
      with:
        repository: DMParker1/ParkerCV
        path: personal-repo
        token: ${{ secrets.PARKER_CV_UPDATE_TOKEN }}

    - name: List files in personal repo
      run: ls -la personal-repo

    - name: List files in personal repo docs
      run: ls -la personal-repo/docs

    - name: Copy CV to Organization Repository
      run: cp personal-repo/docs/ParkerCV.pdf docs/ParkerCV.pdf

    - name: List files in organization repo
      run: ls -la docs

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add docs/ParkerCV.pdf
        git commit -m 'Update CV from personal repository'
        git push origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
